{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white"><h3 class="text-center">➕ Добавить товар</h3></div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3"><label>Название</label><input type="text" name="name" class="form-control" required></div>
                    <div class="mb-3"><label>Описание</label><textarea name="description" class="form-control" rows="3" required></textarea></div>
                    <div class="mb-3"><label>Цена (₽)</label><input type="number" step="0.01" name="price" class="form-control" required></div>
                    <div class="mb-3"><label>Количество</label><input type="number" name="stock" class="form-control" required></div>
                    <div class="mb-3"><label>Скидка (%)</label><input type="number" name="discount" class="form-control" value="0"></div>
                    <div class="mb-3"><label>Фото</label><input type="file" name="image" class="form-control"></div>
                    <button type="submit" class="btn btn-success w-100">Добавить</button>
                    <a href="{{ url_for('admin_panel') }}" class="btn btn-secondary w-100 mt-2">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
