{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header bg-success text-white"><h3 class="text-center">📝 Вход</h3></div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3"><label>Имя пользователя</label><input type="text" name="username" class="form-control" required></div>
                    <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label>Пароль</label><input type="password" name="password" class="form-control" required></div>
                    <button type="submit" class="btn btn-success w-100">Войти</button>
                </form>
                <hr>
                <p class="text-center">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
