{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Регистрация</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="reg_username" class="form-label">Логин</label>
                <input type="text" class="form-control" id="reg_username" name="username" required minlength="2" autocomplete="username">
            </div>
            <div class="mb-3">
                <label for="reg_password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="reg_password" name="password" required minlength="3" autocomplete="new-password">
            </div>
            <div class="mb-3">
                <label for="reg_confirm" class="form-label">Повтор пароля</label>
                <input type="password" class="form-control" id="reg_confirm" name="confirm" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-success">Зарегистрироваться</button>
        </form>
        <p class="mt-3">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
</div>
{% endblock %}
